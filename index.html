<head>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<style>
:root{--bg:#F5F4F0;--s:#FFF;--s2:#F0EFE9;--bd:#E2E0D8;--t:#1A1917;--t2:#6B6860;--t3:#9E9C92;--ac:#2B5CE6;--al:#EBF0FD;--re:#D93F3F;--rl:#FDF0F0;--am:#C07A00;--aml:#FEF3E2;--gn:#2D8653;--gl:#EDFAF4;--bl:#185FA5;--bll:#E6F1FB;--gy:#6B6860;--gyl:#F0EFE9;--pu:#534AB7;--pul:#EEEDFE;--r:12px;--rs:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);font-size:14px;min-height:100vh;}
input,select,textarea{width:100%;padding:10px 14px;border:1px solid var(--bd);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--t);background:var(--s);outline:none;margin-bottom:1rem;}
textarea{resize:vertical;font-size:13px;}
input:focus,select:focus,textarea:focus{border-color:var(--ac);}
.btn{border:none;border-radius:var(--rs);padding:10px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;}
.btn-dk{background:var(--t);color:#fff;width:100%;margin-top:0;}
.btn-dk:hover{opacity:.85;}
.bsm{font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;border:1px solid var(--bd);background:var(--s2);color:var(--t2);}
.b-bl{background:var(--bll);color:var(--bl);border-color:transparent;}
.b-re{background:var(--rl);color:var(--re);border-color:transparent;}
.b-pu{background:var(--pul);color:var(--pu);border-color:transparent;}
.btn-pdf{font-size:12px;color:var(--re);background:var(--rl);border:none;border-radius:6px;padding:5px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;}
.btn-out{font-size:12px;color:var(--t2);background:none;border:1px solid var(--bd);border-radius:6px;padding:5px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.chip{font-size:11px;font-weight:500;padding:3px 9px;border-radius:99px;font-family:'DM Mono',monospace;white-space:nowrap;}
.c-pe{background:var(--aml);color:var(--am);}
.c-pr{background:var(--bll);color:var(--bl);}
.c-te{background:var(--gl);color:var(--gn);}
.c-ur{background:var(--rl);color:var(--re);font-weight:600;}
.c-no{background:var(--gyl);color:var(--gy);}
.c-pc{background:var(--al);color:var(--ac);}
.c-dg{background:var(--pul);color:var(--pu);font-weight:600;}
.c-co{background:#EEEDFE;color:#534AB7;}
.c-mi{background:var(--s2);color:var(--t2);}
.c-fe{background:var(--s2);color:var(--t2);}
.c-ve{background:var(--rl);color:var(--re);font-weight:600;}
.c-px{background:var(--aml);color:var(--am);font-weight:600;}
/* LOGIN */
#pgl{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.lbox{background:var(--s);border:1px solid var(--bd);border-radius:20px;padding:3rem 2.5rem;width:100%;max-width:420px;}
.llogo{display:flex;align-items:center;gap:10px;margin-bottom:2rem;}
.lic{width:40px;height:40px;background:var(--t);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.lic svg{fill:#fff;width:20px;height:20px;}
.lerr{background:var(--rl);color:var(--re);font-size:12px;padding:8px 12px;border-radius:var(--rs);margin-bottom:1rem;display:none;}
.lbl{font-size:12px;font-weight:500;color:var(--t2);margin-bottom:6px;display:block;}
/* APP */
#pga{display:none;min-height:100vh;}
.topbar{background:var(--s);border-bottom:1px solid var(--bd);padding:0 1.25rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.twk{font-size:12px;color:var(--t3);background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:3px 10px;}
.tav{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;}
.fl{display:flex;}.fla{display:flex;align-items:center;}.f1{flex:1;}.fw{flex-wrap:wrap;}.g8{gap:8px;}.g10{gap:10px;}.g12{gap:12px;}
/* LEGEND */
.lgnd{display:flex;gap:10px;flex-wrap:wrap;align-items:center;font-size:11px;color:var(--t2);margin-bottom:1rem;background:var(--s);border:1px solid var(--bd);border-radius:var(--rs);padding:9px 14px;}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.ldv{width:1px;height:14px;background:var(--bd);margin:0 2px;}
.lb2{font-weight:600;color:var(--t);font-size:11px;}
/* TABS */
.twrap{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:1rem;}
.trow{display:flex;border-bottom:1px solid var(--bd);}
.tlbl{font-size:10px;font-weight:600;color:var(--t3);writing-mode:vertical-rl;padding:6px 5px;border-right:1px solid var(--bd);display:flex;align-items:center;background:var(--s2);}
.tinn{display:flex;flex:1;overflow-x:auto;}
.tab{flex:1;min-width:52px;padding:9px 4px;text-align:center;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;border-right:1px solid var(--bd);position:relative;}
.tab:last-child{border-right:none;}
.tab:hover{background:var(--s2);}
.tab.on{background:var(--t);color:#fff;}
.tbd{font-size:10px;opacity:.7;margin-top:1px;}
.tu{position:absolute;top:3px;right:3px;font-size:9px;background:var(--re);color:#fff;border-radius:99px;padding:1px 4px;}
.tab.on .tu{background:#fff;color:var(--t);}
/* DG TABS */
.dtrow{display:flex;border-bottom:1px solid var(--bd);background:var(--s2);}
.dtlbl{font-size:9px;font-weight:600;color:var(--t3);writing-mode:vertical-rl;padding:3px 4px;border-right:1px solid var(--bd);display:flex;align-items:center;}
.dtinn{display:flex;flex:1;overflow-x:auto;}
.dtab{flex:1;min-width:58px;padding:7px 5px;text-align:center;font-size:11px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.dtab:hover{color:var(--t);}
.dtab.on{color:var(--ac);border-bottom-color:var(--ac);background:var(--s);}
/* PENDIENTES */
.plist{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:1rem;}
.pitem{border-bottom:1px solid var(--bd);padding:1rem 1.25rem;}
.pitem:last-child{border-bottom:none;}
.pitem.iA{border-left:3px solid var(--pu);}
.pitem.iC{border-left:3px solid #7F77DD;}
.pnm{font-size:14px;font-weight:500;}
.pch{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center;}
.pwrap{margin-top:8px;}
.plbl{font-size:10px;color:var(--t3);margin-bottom:3px;font-family:'DM Mono',monospace;}
.pbar{height:5px;background:var(--s2);border-radius:99px;overflow:hidden;}
.pfil{height:100%;border-radius:99px;transition:width .3s;}
.nbox{margin-top:8px;font-size:12px;color:var(--t2);background:var(--s2);border-radius:var(--rs);padding:8px 10px;line-height:1.6;border-left:2px solid var(--bd);}
/* CHAT */
.chwrap{margin-top:10px;border:1px solid var(--bd);border-radius:var(--rs);overflow:hidden;}
.chmsgs{max-height:180px;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:6px;background:var(--s2);}
.chmsg{max-width:85%;padding:7px 10px;border-radius:10px;font-size:12px;line-height:1.5;}
.chmsg.dg{background:var(--t);color:#fff;align-self:flex-end;border-radius:10px 10px 2px 10px;}
.chmsg.dr{background:var(--s);color:var(--t);align-self:flex-start;border:1px solid var(--bd);border-radius:10px 10px 10px 2px;}
.chwho{font-size:10px;font-weight:600;margin-bottom:2px;opacity:.75;}
.chinp{display:flex;border-top:1px solid var(--bd);background:var(--s);}
.chinp input{flex:1;padding:8px 12px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--t);background:transparent;outline:none;margin-bottom:0;}
.chbtn{padding:8px 14px;background:var(--t);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;}
.chbtn:hover{opacity:.85;}
/* ADD FORM */
.acard{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem;}
.atit{font-size:13px;font-weight:600;margin-bottom:1rem;}
.fg{flex:1;min-width:120px;}
.fg select,.fg input{margin-bottom:0;}
/* DIR HEADER */
#dv{padding:1.25rem;max-width:720px;margin:0 auto;}
.dhdr{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;gap:14px;}
.dhav{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;flex-shrink:0;}
/* DG */
#dgv{padding:1.25rem;max-width:880px;margin:0 auto;}
.sgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1.25rem;}
.sc{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:.9rem 1rem;}
.sclbl{font-size:10px;color:var(--t3);font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
.scval{font-size:26px;font-weight:600;margin-top:4px;font-family:'DM Mono',monospace;letter-spacing:-1px;}
.dcard{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.dhd{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;cursor:pointer;}
.dhd:hover{background:var(--s2);}
.dav{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.dnm{font-size:14px;font-weight:600;}
.dsub{font-size:11px;color:var(--t3);margin-top:1px;}
.chev{font-size:16px;color:var(--t3);transition:transform .2s;flex-shrink:0;margin-left:4px;}
.chev.open{transform:rotate(90deg);}
.dbody{border-top:1px solid var(--bd);display:none;}
.dbody.open{display:block;}
.dgrow{padding:12px 1.25rem;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;gap:10px;}
.dgrow:last-child{border-bottom:none;}
.dgrow.iA{border-left:3px solid var(--pu);}
.dgrow.iC{border-left:3px solid #7F77DD;}
.aform{padding:12px 1.25rem 14px;background:var(--pul);border-top:1px solid var(--bd);display:none;}
.aform.open{display:block;}
.albl{font-size:11px;font-weight:600;color:var(--pu);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;}
.ai{flex:1;min-width:130px;padding:8px 12px;border:1px solid var(--bd);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;background:#fff;color:var(--t);outline:none;margin-bottom:0;}
.as2{padding:8px 10px;border:1px solid var(--bd);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;background:#fff;color:var(--t);outline:none;margin-bottom:0;width:auto;}
.asnd{padding:8px 14px;background:var(--pu);color:#fff;border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;}
.echart{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:1.25rem;margin-bottom:1.25rem;}
.ewrap{position:relative;height:240px;}
/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:500;padding:1rem;}
.mbg.open{display:flex;}
.mbox{background:var(--s);border-radius:var(--r);padding:1.5rem;width:100%;max-width:480px;border:1px solid var(--bd);max-height:90vh;overflow-y:auto;}
.mtit{font-size:16px;font-weight:600;margin-bottom:1.25rem;}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;}
.bcan{padding:8px 16px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--s2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;color:var(--t2);}
.bsav{padding:8px 16px;border:none;border-radius:var(--rs);background:var(--t);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--t);color:#fff;padding:10px 18px;border-radius:var(--rs);font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .3s;z-index:999;}
.toast.show{opacity:1;}
@media print{.topbar,.btn-pdf,.btn-out,.chev,.aform,.bsm,.btn-dk,.acard,.lgnd,#pgl,.echart{display:none!important;}.dbody{display:block!important;}body{background:#fff;}}
@media(max-width:560px){.sgrid{grid-template-columns:repeat(3,1fr);}.twk,.tuname{display:none;}}
</style>
</head>

// SEMANA
(function(){
  var h=new Date(),d=h.getDay(),dl=d===0?-6:1-d,l=new Date(h);
  l.setDate(h.getDate()+dl);
  var ms=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  var fmt=function(x){return x.getDate()+" "+ms[x.getMonth()];};
  var ns=Math.ceil(((l-new Date(l.getFullYear(),0,1))/86400000+new Date(l.getFullYear(),0,1).getDay()+1)/7);
  var nd=["Lun","Mar","Mie","Jue","Vie","Sab"],dias=[],fechas=[];
  for(var w=0;w<2;w++)for(var i=0;i<6;i++){var x=new Date(l);x.setDate(l.getDate()+w*7+i);dias.push(nd[i]);fechas.push(fmt(x));}
  var hi=d===0?5:Math.min(d-1,5),s2=new Date(l);s2.setDate(l.getDate()+12);
  window.DIAS=dias;window.FECHAS=fechas;window.HOY=hi;window.SK="tblr_"+l.getFullYear()+"_"+ns;
  window.SEMLAB="Sem "+ns+"-"+(ns+1)+" · "+fmt(l)+"–"+fmt(s2)+" "+l.getFullYear();
})();

// STORAGE
var cache={};
function getPends(id){return cache[id]||[];}
function savePends(id,p){
  cache[id]=p;
  DB.ref(SK+"/dir_"+id).set(p).catch(function(e){console.warn("FB:",e);});
  try{var a=JSON.parse(localStorage.getItem(SK)||"{}");a[id]=p;localStorage.setItem(SK,JSON.stringify(a));}catch(e){}
}
function subDir(id,cb){DB.ref(SK+"/dir_"+id).on("value",function(s){var v=s.val();cache[id]=Array.isArray(v)?v:[];cb();});}
function subAll(cb){DB.ref(SK).on("value",function(s){var v=s.val()||{};DM.forEach(function(d){cache[d.id]=Array.isArray(v["dir_"+d.id])?v["dir_"+d.id]:[];});cb();});}

// HELPERS
function eL(e){return e==="pendiente"?"Pendiente":e==="en-proceso"?"En proceso":"Terminado";}
function eC(e){return e==="pendiente"?"var(--am)":e==="en-proceso"?"var(--bl)":"var(--gn)";}
function fChip(f){
  if(!f)return "";
  var h=new Date();h.setHours(0,0,0,0);
  var fc=new Date(f+"T00:00:00"),diff=Math.ceil((fc-h)/86400000);
  var lb=fc.toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"numeric"});
  if(diff<0)return '<span class="chip c-ve">&#x26A0; Vencida: '+lb+'</span>';
  if(diff<=3)return '<span class="chip c-px">&#x23F0; Vence: '+lb+'</span>';
  return '<span class="chip c-fe">&#x1F4C5; '+lb+'</span>';
}
function cChip(c){
  if(!c||!c.length)return "";
  return '<span class="chip c-co">&#x1F465; Con: '+c.map(function(x){return DN[x]||x;}).join(", ")+'</span>';
}
function getDirName(id){for(var i=0;i<DM.length;i++){if(DM[i].id===id)return DM[i].n;}return "Dir";}

// CHAT HTML builder
function buildChat(msgs,dirId,pIdx){
  if(!msgs)msgs=[];
  var uid="ch_"+dirId+"_"+pIdx;
  var mh=msgs.length?msgs.map(function(m){
    var dg=m.who==="dg";
    return '<div class="chmsg '+(dg?"dg":"dr")+'"><div class="chwho">'+(dg?"Director General":getDirName(m.did||dirId))+'</div>'+escHtml(m.txt)+'</div>';
  }).join(""):'<div style="font-size:12px;color:var(--t3);text-align:center;padding:8px;">Sin comentarios aun</div>';
  return '<div class="chwrap"><div class="chmsgs" id="'+uid+'">'+mh+'</div><div class="chinp"><input id="'+uid+'_i" placeholder="Escribe un mensaje..." onkeydown="if(event.key===\'Enter\')sendChat('+dirId+','+pIdx+')"><button class="chbtn" onclick="sendChat('+dirId+','+pIdx+')">Enviar</button></div></div>';
}
function escHtml(t){return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function sendChat(dirId,pIdx){
  var uid="ch_"+dirId+"_"+pIdx;
  var inp=document.getElementById(uid+"_i");
  if(!inp||!inp.value.trim())return;
  var txt=inp.value.trim();
  var p=getPends(dirId);
  if(!p[pIdx])return;
  if(!p[pIdx].chat)p[pIdx].chat=[];
  var who=CU.r==="dg"?"dg":"dir";
  p[pIdx].chat.push({who:who,did:CU.d,txt:txt,ts:Date.now()});
  savePends(dirId,p);
  inp.value="";
  // Notify director if DG is sending
  if(CU.r==="dg") notifyDGComment(dirId, p[pIdx].txt);
  showToast("Mensaje enviado");
}

function setDia(i){dirDia=i;renderDir();}

function addPend(){
  var txt=document.getElementById("ntxt").value.trim();
  if(!txt){showToast("Escribe el nombre");return;}
  var est=document.getElementById("nest").value,pri=document.getElementById("npri").value;
  var pct=parseInt(document.getElementById("npct").value)||0;
  var fec=document.getElementById("nfec").value||"",not=document.getElementById("nnot").value.trim();
  var cs=document.getElementById("ncol"),col=Array.from(cs.selectedOptions).map(function(o){return parseInt(o.value);});

  p.push({txt:txt,est:est,prio:pri,pct:pct,fecha:fec,nota:not,colabs:col,dia:dirDia,chat:[]});
  savePends(CU.d,p);
  col.forEach(function(cid){if(cid===CU.d)return;var cp=getPends(cid);cp.push({txt:txt,est:est,prio:pri,pct:pct,fecha:fec,nota:not,colabs:col,dia:dirDia,chat:[],mirroredFrom:CU.d});savePends(cid,cp);});

  var p=getPends(CU.d);var item=p[editIdx];
  item.txt=document.getElementById("etxt").value.trim();item.est=document.getElementById("eest").value;
  item.prio=document.getElementById("epri").value;item.pct=parseInt(document.getElementById("epct").value)||0;
  item.fecha=document.getElementById("efec").value||"";item.nota=document.getElementById("enot").value.trim();
  var ec=document.getElementById("ecol");item.colabs=Array.from(ec.selectedOptions).map(function(o){return parseInt(o.value);});

function renderChart(){
  if(chartI){chartI.destroy();chartI=null;}
  var cv=document.getElementById("chart");if(!cv)return;
  var labels=DM.map(function(d){return d.n;});
  var pend=DM.map(function(d){return getPends(d.id).filter(function(p){return p.est==="pendiente";}).length;});
  var proc=DM.map(function(d){return getPends(d.id).filter(function(p){return p.est==="en-proceso";}).length;});
  var term=DM.map(function(d){return getPends(d.id).filter(function(p){return p.est==="terminado";}).length;});
  chartI=new Chart(cv,{
    type:"bar",
    data:{
      labels:labels,
      datasets:[
        {label:"Pendiente", data:pend, backgroundColor:"#FEF3E2", borderColor:"#C07A00", borderWidth:1.5, borderRadius:4, borderSkipped:false},
        {label:"En proceso", data:proc, backgroundColor:"#E6F1FB", borderColor:"#185FA5", borderWidth:1.5, borderRadius:4, borderSkipped:false},
        {label:"Terminado",  data:term, backgroundColor:"#EDFAF4", borderColor:"#2D8653", borderWidth:1.5, borderRadius:4, borderSkipped:false}
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
